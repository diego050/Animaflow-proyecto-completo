name: Deploy to Testing

on:
  push:
    branches: [Testing]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to testing VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.TESTING_HOST }}
          username: ${{ secrets.TESTING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/animaflow
            git fetch origin
            git reset --hard origin/Testing
            
            # Copy environment file if it exists
            if [ -f /opt/animaflow/.env ]; then
              cp /opt/animaflow/.env /opt/animaflow/backend/.env
            fi
            
            # Rebuild and restart services with Docker
            docker compose -f docker-compose.prod.yml pull
            # Rebuild only services that change frequently (skip worker-render, it's heavy)
            docker compose -f docker-compose.prod.yml up -d --build api worker-default frontend
            # Ensure worker-render is running (rebuild to pick up Dockerfile changes)
            docker compose -f docker-compose.prod.yml up -d --build worker-render
            
            # Wait for Postgres to be ready
            echo "Waiting for Postgres to be ready..."
            sleep 10
            until docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres; do
              echo "Postgres is not ready yet. Retrying in 3s..."
              sleep 3
            done
            echo "Postgres is ready!"
            
            # Run database migrations in the running container
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            
            # Clean up dangling images only (never system prune on shared VPS)
            docker image prune -f
            
            echo "Testing deployment complete"
