name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/animaflow
            git fetch origin
            git reset --hard origin/main
            
            # Copy environment file if it exists
            if [ -f /opt/animaflow/.env ]; then
              cp /opt/animaflow/.env /opt/animaflow/backend/.env
            fi
            
            # Ensure backup directory exists
            mkdir -p /opt/animaflow/backups
            
            # Backup database before migration
            docker compose -f docker-compose.prod.yml exec -T postgres pg_dump -U postgres animaflow > /opt/animaflow/backups/backup_$(date +%Y%m%d_%H%M%S).sql
            
            # Rebuild and restart all services
            docker compose -f docker-compose.prod.yml pull
            # Rebuild only services that change frequently (skip worker-render, it's heavy)
            docker compose -f docker-compose.prod.yml up -d --build api worker-default frontend
            # Ensure worker-render is running (uses existing image if not changed)
            docker compose -f docker-compose.prod.yml up -d worker-render
            
            # Wait for Postgres to be ready
            echo "Waiting for Postgres to be ready..."
            sleep 10
            until docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U postgres; do
              echo "Postgres is not ready yet. Retrying in 3s..."
              sleep 3
            done
            echo "Postgres is ready!"
            
            # Run database migrations in the running container
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            
            # Health check
            sleep 10
            curl -f http://localhost:8000/health || exit 1
            
            # Clean up dangling images only (never system prune on shared VPS)
            docker image prune -f
            
            echo "Production deployment complete"

      - name: Notify on success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          # Add Slack/Discord notification here if needed

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          # Add Slack/Discord notification here if needed
