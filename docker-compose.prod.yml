services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_BASE_DIR=/app
    volumes:
      - animaflow_storage:/app/storage
      - remotion_generated:/app/frontend/src/remotion/generated
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - animaflow_net

  worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker --queues default
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_BASE_DIR=/app
    volumes:
      - animaflow_storage:/app/storage
      - remotion_generated:/app/frontend/src/remotion/generated
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 3G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

  worker-render:
    build:
      context: .
      dockerfile: backend/Dockerfile.render
    user: "1000:1000"
    command: python -m worker --queues render
    depends_on:
      - postgres
      - redis
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_BASE_DIR=/app
    volumes:
      - animaflow_storage:/app/storage
      - remotion_generated:/app/frontend/src/remotion/generated
      - whisper_cache:/home/appuser/.cache/whisper
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

  postgres:
    image: postgres:15-alpine
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - animaflow_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - animaflow_net

  # SonarQube — Code quality analysis (disabled by default, use: docker compose --profile security up sonarqube -d)
  sonarqube:
    image: sonarqube:community
    profiles: ["security"]
    restart: "no"
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      SONAR_WEB_JAVAOPTS: "-Xmx1g"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

volumes:
  postgres_data:
  animaflow_storage:
  remotion_generated:
  redis_data:
  whisper_cache:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  animaflow_net:
    driver: bridge
