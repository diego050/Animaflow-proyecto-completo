services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - render-server
    env_file:
      - ./backend/.env
    environment:
      - STORAGE_BASE_DIR=/app
      - RENDER_SERVER_URL=http://render-server:3001
      - RENDER_MODE=local
    volumes:
      - animaflow_storage:/app/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - animaflow_net

  render-server:
    build:
      context: ./
      dockerfile: ./servers/Dockerfile.render-server
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - animaflow_storage:/app/storage
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

  postgres:
    image: pgvector/pgvector:pg15
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - animaflow_net

  # SonarQube — Code quality analysis (disabled by default, use: docker compose --profile security up sonarqube -d)
  sonarqube:
    image: sonarqube:community
    profiles: ["security"]
    restart: "no"
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
      SONAR_WEB_JAVAOPTS: "-Xmx1g"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - animaflow_net

volumes:
  postgres_data:
  animaflow_storage:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  animaflow_net:
    driver: bridge
